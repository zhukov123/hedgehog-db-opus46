apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: hedgehogdb
  labels:
    app: tempo
data:
  tempo.yml: |
    stream_over_http_enabled: true
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
    ingester:
      trace_idle_period: 10s
      max_block_bytes: 1000000
      max_block_duration: 5m
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    compactor:
      compaction:
        block_retention: 1h
      ring:
        kvstore:
          store: inmemory
    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: hedgehogdb-k8s
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus.hedgehogdb.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
    usage_report:
      reporting_enabled: false
