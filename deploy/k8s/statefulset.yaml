apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hedgehogdb
  namespace: hedgehogdb
  labels:
    app: hedgehogdb
spec:
  serviceName: hedgehogdb
  replicas: 3
  selector:
    matchLabels:
      app: hedgehogdb
  template:
    metadata:
      labels:
        app: hedgehogdb
    spec:
      containers:
        - name: hedgehogdb
          image: hedgehogdb:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.hedgehogdb.svc.cluster.local:4318"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/hedgehogdb
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: hedgehogdb-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
