apiVersion: v1
kind: ConfigMap
metadata:
  name: hedgehogdb-config
  namespace: hedgehogdb
  labels:
    app: hedgehogdb
data:
  config.json: |
    {
      "node_id": "",
      "bind_addr": "0.0.0.0:8080",
      "data_dir": "/data",
      "seed_nodes": [],
      "virtual_nodes": 128,
      "replication_n": 3,
      "read_quorum": 2,
      "write_quorum": 2,
      "buffer_pool_size": 1024,
      "partition_count": 8,
      "heartbeat_interval_ms": 1000,
      "failure_timeout_ms": 5000,
      "anti_entropy_interval_sec": 1800
    }
